# Config for `cargo about` — generates the third-party license notices bundled
# with the native plugin. We cover the shipped editor targets (macOS + Windows)
# plus the standalone debugger's intentionally retained future Linux dependency
# path so every distributed or CI-validated runtime dependency has a notice.
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unicode-3.0",
    "Unlicense",
    "0BSD",
    "MPL-2.0",
    # The debugger's egui window: clipboard-win/error-code (BSL-1.0) via
    # egui-winit's clipboard, and egui's bundled fonts (OFL-1.1 +
    # Ubuntu-font-1.0 via epaint_default_fonts). All permissive; the font
    # licenses are satisfied by shipping their notices, which this generates.
    "BSL-1.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
]

# Shipped targets: macOS aarch64/x86_64 and Windows x86_64. Linux x86_64 is the
# CI dependency-validation target for the future standalone debugger port; no
# Linux binary or Unity native plugin ships yet.
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
]
