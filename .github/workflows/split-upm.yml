name: Security, native builds, and provenance

on:
  pull_request:
  push:
    branches: [main, 'feat/**']
    tags: ['v*']
  workflow_dispatch:

permissions: {}

concurrency:
  group: unterm-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.94.1

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust toolchain
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal

      - name: Cache Cargo inputs
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: native

      - name: Install pinned cargo-binstall
        env:
          CARGO_BINSTALL_SHA256: 3be2695803f7b9a86b9976f2bdb8568ed6e8df026bacfc39c8546d3c6ea34808
          CARGO_BINSTALL_VERSION: 1.16.2
        run: |
          archive="$RUNNER_TEMP/cargo-binstall.tgz"
          extract_dir="$RUNNER_TEMP/cargo-binstall"
          url="https://github.com/cargo-bins/cargo-binstall/releases/download/v${CARGO_BINSTALL_VERSION}/cargo-binstall-x86_64-unknown-linux-musl.tgz"
          mkdir -p "$extract_dir"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "$url" --output "$archive"
          echo "${CARGO_BINSTALL_SHA256}  ${archive}" | sha256sum --check --strict
          tar -xzf "$archive" -C "$extract_dir"
          install -m 0755 "$extract_dir/cargo-binstall" "$HOME/.cargo/bin/cargo-binstall"
          grep -aFq "cargo-binstall/${CARGO_BINSTALL_VERSION}" "$HOME/.cargo/bin/cargo-binstall"
          test "$(cargo binstall -V)" = "$CARGO_BINSTALL_VERSION"

      - name: Install pinned supply-chain tools
        env:
          BINSTALL_DISABLE_TELEMETRY: 'true'
        run: |
          cargo binstall --force --no-confirm --locked \
            cargo-audit@0.22.1 \
            cargo-deny@0.20.2 \
            cargo-cyclonedx@0.5.9 \
            cargo-about@0.9.1
          command -v cargo-audit cargo-deny cargo-cyclonedx cargo-about > /dev/null

      - name: Verify the locked dependency graph
        run: cargo metadata --manifest-path native/Cargo.toml --locked --format-version 1 > /dev/null

      - name: Verify standalone Linux debugger dependencies
        run: |
          linux_tree="$RUNNER_TEMP/unterm-linux-features.txt"
          cargo tree --manifest-path native/Cargo.toml -p unterm \
            --target x86_64-unknown-linux-gnu --edges features --invert winit --locked \
            | tee "$linux_tree"
          grep -Fq 'winit feature "x11"' "$linux_tree"
          if grep -Fq 'winit feature "wayland"' "$linux_tree"; then
            echo "Wayland must remain disabled until wayland-scanner uses a patched quick-xml release."
            exit 1
          fi

      - name: Deny vulnerable and unsound Rust advisories
        run: cargo audit --file native/Cargo.lock

      - name: Enforce advisory, license, source, and dependency policy
        run: cargo deny --manifest-path native/Cargo.toml --config native/deny.toml check advisories bans licenses sources

      - name: Generate CycloneDX SBOM
        working-directory: native/unterm
        run: |
          cargo cyclonedx --format json --override-filename unterm.cdx
          test -s unterm.cdx.json

      - name: Verify native third-party notices
        run: |
          native/generate-notices.sh
          git diff --exit-code -- "Packages/dev.tnayuki.unterm/Third Party Notices.md"

      - name: Verify pinned source provenance
        env:
          HARDENING_BRANCH: feat/toolkit-icon-performance-mcp
          UPSTREAM_BASE_COMMIT: ead1391bd38532eebfb9f13f10064eddc372b769
        run: |
          jq -e \
            --arg hardeningBranch "$HARDENING_BRANCH" \
            --arg upstreamBaseCommit "$UPSTREAM_BASE_COMMIT" \
            '.schemaVersion == 1 and
             .source.repository == "https://github.com/tnayuki/Unity-Unterm" and
             .source.commit == $upstreamBaseCommit and
             .distribution.repository == "https://github.com/rankupgames/Unity-Unterm" and
             .distribution.sourceBranch == "upstream/main" and
             .distribution.hardeningBranch == $hardeningBranch' \
            provenance/source.json

      - name: Upload SBOM and notices
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unterm-supply-chain
          path: |
            native/unterm/unterm.cdx.json
            Packages/dev.tnayuki.unterm/Third Party Notices.md
            provenance/source.json
          if-no-files-found: error
          retention-days: 30

  build-macos:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy
          rustup default "$RUST_TOOLCHAIN"

      - name: Cache Cargo inputs
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: native

      - name: Run native tests and lints
        working-directory: native
        run: |
          cargo test -p unterm --lib --locked
          # Deny new warnings while preserving the upstream crate's documented
          # legacy lint debt until those broad refactors can be reviewed separately.
          cargo clippy -p unterm --lib --bins --tests --locked -- \
            -D warnings \
            -A clippy::too_many_arguments \
            -A clippy::type_complexity \
            -A clippy::manual_div_ceil \
            -A clippy::get_first \
            -A clippy::if_same_then_else \
            -A clippy::explicit_counter_loop \
            -A clippy::needless_range_loop \
            -A clippy::unnecessary_map_or \
            -A clippy::manual_map \
            -A clippy::missing_safety_doc

      - name: Build universal native bundle
        run: native/build-macos.sh release

      - name: Write checksum and build provenance
        run: |
          LIBRARY="Packages/dev.tnayuki.unterm/Editor/Plugins/macOS/unterm.dylib"
          DEBUGGER="Packages/dev.tnayuki.unterm/Editor/Plugins/macOS/unterm-debugger"
          test -x "$DEBUGGER"
          library_sha256="$(shasum -a 256 "$LIBRARY" | awk '{print $1}')"
          debugger_sha256="$(shasum -a 256 "$DEBUGGER" | awk '{print $1}')"
          printf '%s  %s\n%s  %s\n' \
            "$library_sha256" "$(basename "$LIBRARY")" \
            "$debugger_sha256" "$(basename "$DEBUGGER")" \
            > unterm-macos.sha256
          jq -n \
            --arg commit "$GITHUB_SHA" \
            --arg runner "macos-15" \
            --arg toolchain "$RUST_TOOLCHAIN" \
            --arg sourceDateEpoch "$(git log -1 --pretty=%ct)" \
            --arg sha256 "$library_sha256" \
            --arg debuggerSha256 "$debugger_sha256" \
            '{schemaVersion:1, commit:$commit, runner:$runner, rustToolchain:$toolchain, sourceDateEpoch:$sourceDateEpoch, artifact:"unterm.dylib", sha256:$sha256, debuggerArtifact:"unterm-debugger", debuggerSha256:$debuggerSha256, debuggerSignature:"ad-hoc"}' \
            > build-provenance-macos.json

      - name: Upload macOS build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unterm-macos
          path: |
            Packages/dev.tnayuki.unterm/Editor/Plugins/macOS/unterm.dylib
            Packages/dev.tnayuki.unterm/Editor/Plugins/macOS/unterm-debugger
            unterm-macos.sha256
            build-provenance-macos.json
          if-no-files-found: error
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install $env:RUST_TOOLCHAIN --profile minimal
          rustup default $env:RUST_TOOLCHAIN

      - name: Cache Cargo inputs
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: native

      - name: Build native DLL
        shell: pwsh
        run: native/build-windows.ps1 -Configuration release

      - name: Write checksum and build provenance
        shell: pwsh
        run: |
          $binary = 'Packages/dev.tnayuki.unterm/Editor/Plugins/Windows/x86_64/unterm.dll'
          $debugger = 'Packages/dev.tnayuki.unterm/Editor/Plugins/Windows/x86_64/unterm-debugger.exe'
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $binary).Hash.ToLowerInvariant()
          $debuggerHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $debugger).Hash.ToLowerInvariant()
          @(
              "$hash  unterm.dll"
              "$debuggerHash  unterm-debugger.exe"
          ) | Set-Content -Encoding ascii unterm-windows.sha256
          $sourceDateEpoch = (git log -1 --pretty=%ct)
          [ordered]@{
              schemaVersion = 1
              commit = $env:GITHUB_SHA
              runner = 'windows-latest'
              rustToolchain = $env:RUST_TOOLCHAIN
              sourceDateEpoch = $sourceDateEpoch
              artifact = 'unterm.dll'
              sha256 = $hash
              debuggerArtifact = 'unterm-debugger.exe'
              debuggerSha256 = $debuggerHash
          } | ConvertTo-Json | Set-Content -Encoding utf8 build-provenance-windows.json

      - name: Upload Windows build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unterm-windows
          path: |
            Packages/dev.tnayuki.unterm/Editor/Plugins/Windows/x86_64/unterm.dll
            Packages/dev.tnayuki.unterm/Editor/Plugins/Windows/x86_64/unterm-debugger.exe
            unterm-windows.sha256
            build-provenance-windows.json
          if-no-files-found: error
          retention-days: 30

  attest-builds:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [build-macos, build-windows, supply-chain]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download macOS build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unterm-macos
          path: artifacts/macos

      - name: Download Windows build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unterm-windows
          path: artifacts/windows

      - name: Download supply-chain evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unterm-supply-chain
          path: artifacts/supply-chain

      - name: Attest native libraries, debugger executables, and evidence
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/**/*
